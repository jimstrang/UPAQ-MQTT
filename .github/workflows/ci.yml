name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check bridge.py

      - name: Syntax check
        run: python -m py_compile bridge.py

      - name: Docker build
        run: docker build -t upaq-mqtt .
